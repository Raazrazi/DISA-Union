<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>
  <!-- Camera body -->
  <rect x="45" y="75" width="110" height="75" rx="12" ry="12" fill="white" opacity="0.9"/>
  <!-- Camera lens -->
  <circle cx="100" cy="112" r="28" fill="#1e1b4b"/>
  <circle cx="100" cy="112" r="20" fill="#7c3aed"/>
  <circle cx="100" cy="112" r="12" fill="white" opacity="0.3"/>
  <circle cx="93" cy="105" r="4" fill="white" opacity="0.7"/>
  <!-- Flash bump -->
  <rect x="68" y="60" width="30" height="18" rx="5" fill="white" opacity="0.9"/>
  <!-- Shutter button -->
  <circle cx="148" cy="88" r="8" fill="#a78bfa"/>
</svg>
